<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AquaLab — Gestion du Laboratoire</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════════════════
   DESIGN SYSTEM — Industrial / Scientific Aesthetic
   Palette: Deep teal, near-black, acid green accents
═══════════════════════════════════════════════════════════ */
:root {
  --bg:        #0c1117;
  --bg2:       #131b24;
  --bg3:       #1a2635;
  --border:    #1e3148;
  --border2:   #2a4060;
  --text:      #c8ddf0;
  --text2:     #7a9ab8;
  --text3:     #4a6b8a;
  --accent:    #00e5b0;
  --accent2:   #00b8ff;
  --warn:      #ffbe00;
  --danger:    #ff4d6d;
  --ok:        #39ff8a;
  --mono:      'DM Mono', monospace;
  --sans:      'Sora', sans-serif;
  --radius:    8px;
  --shadow:    0 4px 24px rgba(0,0,0,0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  display: flex;
  overflow: hidden;
}

/* ── SIDEBAR ─────────────────────────────────────── */
.sidebar {
  width: 220px;
  min-width: 220px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 24px 0 16px;
  z-index: 10;
}
.logo {
  padding: 0 20px 28px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 12px;
}
.logo-icon { font-size: 26px; margin-bottom: 4px; }
.logo h1 { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
.logo p  { font-size: 10px; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }

.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 20px;
  cursor: pointer;
  font-size: 13px; font-weight: 500;
  color: var(--text2);
  border-left: 3px solid transparent;
  transition: all .15s;
  position: relative;
}
.nav-item:hover  { background: var(--bg3); color: var(--text); }
.nav-item.active { background: var(--bg3); color: var(--accent); border-left-color: var(--accent); }
.nav-item .icon  { font-size: 16px; width: 20px; text-align: center; }
.nav-badge {
  margin-left: auto;
  background: var(--danger);
  color: #fff;
  font-size: 10px; font-weight: 700;
  border-radius: 10px;
  padding: 1px 6px;
  font-family: var(--mono);
  display: none;
}
.nav-badge.show { display: block; }

.sidebar-footer { margin-top: auto; padding: 12px 20px; font-size: 11px; color: var(--text3); }

/* ── MAIN CONTENT ────────────────────────────────── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.topbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex; align-items: center; justify-content: space-between;
}
.topbar h2 { font-size: 16px; font-weight: 600; }
.topbar-right { display: flex; gap: 10px; align-items: center; }

.content { flex: 1; overflow-y: auto; padding: 24px 28px; }

/* ── CARDS / PANELS ──────────────────────────────── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
}
.card-title { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: var(--text3); margin-bottom: 12px; font-family: var(--mono); }

/* ── DASHBOARD STATS ─────────────────────────────── */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
}
.stat-card.teal::before   { background: var(--accent); }
.stat-card.blue::before   { background: var(--accent2); }
.stat-card.warn::before   { background: var(--warn); }
.stat-card.danger::before { background: var(--danger); }
.stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; font-family: var(--mono); }
.stat-value { font-size: 32px; font-weight: 700; font-family: var(--mono); }
.stat-card.teal   .stat-value { color: var(--accent); }
.stat-card.blue   .stat-value { color: var(--accent2); }
.stat-card.warn   .stat-value { color: var(--warn); }
.stat-card.danger .stat-value { color: var(--danger); }
.stat-sub { font-size: 11px; color: var(--text3); margin-top: 6px; }

/* ── TABLE ────────────────────────────────────────── */
.table-wrap { overflow-x: auto; }
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
thead th {
  text-align: left;
  padding: 10px 12px;
  font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--text3);
  border-bottom: 1px solid var(--border);
  font-family: var(--mono);
  white-space: nowrap;
}
tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background .12s;
  cursor: pointer;
}
tbody tr:hover { background: var(--bg3); }
tbody td {
  padding: 11px 12px;
  color: var(--text);
  vertical-align: middle;
}
tbody td.mono { font-family: var(--mono); font-size: 12px; }

/* ── BADGES ──────────────────────────────────────── */
.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px; font-weight: 600;
  font-family: var(--mono);
  white-space: nowrap;
}
.badge-ok      { background: rgba(57,255,138,.15); color: var(--ok); }
.badge-warn    { background: rgba(255,190,0,.15); color: var(--warn); }
.badge-danger  { background: rgba(255,77,109,.15); color: var(--danger); }
.badge-info    { background: rgba(0,229,176,.15); color: var(--accent); }
.badge-blue    { background: rgba(0,184,255,.15); color: var(--accent2); }
.badge-neutral { background: rgba(122,154,184,.1); color: var(--text2); }

/* ── FORMS ────────────────────────────────────────── */
.form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.form-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
.form-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group.full { grid-column: 1 / -1; }

label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; font-family: var(--mono); }
input, select, textarea {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 8px 12px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  transition: border .15s;
  width: 100%;
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(0,229,176,.1);
}
select option { background: var(--bg3); }

/* ── BUTTONS ─────────────────────────────────────── */
.btn {
  padding: 9px 18px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  font-size: 13px; font-weight: 600;
  font-family: var(--sans);
  transition: all .15s;
  white-space: nowrap;
}
.btn-primary   { background: var(--accent); color: #0c1117; }
.btn-primary:hover { background: #00c99a; }
.btn-secondary { background: var(--bg3); color: var(--text2); border: 1px solid var(--border2); }
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger    { background: rgba(255,77,109,.15); color: var(--danger); border: 1px solid rgba(255,77,109,.3); }
.btn-danger:hover { background: var(--danger); color: #fff; }
.btn-warn      { background: rgba(255,190,0,.15); color: var(--warn); border: 1px solid rgba(255,190,0,.3); }
.btn-sm        { padding: 5px 12px; font-size: 12px; }
.btn-icon      { padding: 7px; font-size: 14px; line-height: 1; }

/* ── MODAL ────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.65);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
  opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 28px;
  width: 90%; max-width: 780px;
  max-height: 90vh;
  overflow-y: auto;
  transform: translateY(20px);
  transition: transform .2s;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
.modal-header h3 { font-size: 16px; font-weight: 600; }
.modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 22px; padding-top: 16px; border-top: 1px solid var(--border); }

/* ── RECOMMANDATION CARD ─────────────────────────── */
.reco-box {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 20px;
  margin-top: 16px;
}
.reco-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
.reco-score { font-family: var(--mono); font-size: 36px; font-weight: 700; }
.score-ok      { color: var(--ok); }
.score-warn    { color: var(--warn); }
.score-danger  { color: var(--danger); }
.reco-actions { list-style: none; }
.reco-actions li { padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; display: flex; gap: 8px; }
.reco-actions li:last-child { border: none; }

.doses-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 14px 0; }
.dose-item {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px;
}
.dose-produit { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; font-family: var(--mono); }
.dose-valeur  { font-size: 20px; font-weight: 700; color: var(--accent); font-family: var(--mono); margin: 4px 0; }
.dose-unit    { font-size: 11px; color: var(--text2); }

/* ── ALERTES ─────────────────────────────────────── */
.alerte-item {
  background: var(--bg3);
  border-radius: 6px;
  padding: 12px 16px;
  margin-bottom: 8px;
  border-left: 3px solid var(--border2);
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
}
.alerte-item.Critique    { border-left-color: var(--danger); }
.alerte-item.Avertissement { border-left-color: var(--warn); }
.alerte-item.Info        { border-left-color: var(--accent); }
.alerte-titre { font-size: 13px; font-weight: 600; }
.alerte-msg   { font-size: 12px; color: var(--text2); margin-top: 3px; }
.alerte-meta  { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-top: 4px; }

/* ── PROGRESS BAR ────────────────────────────────── */
.progress-bar {
  height: 4px;
  background: var(--bg3);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 4px;
}
.progress-fill { height: 100%; border-radius: 2px; transition: width .4s; }

/* ── PARAMS TABLE ────────────────────────────────── */
.param-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.param-item {
  background: var(--bg3);
  border-radius: 6px;
  padding: 10px 12px;
}
.param-name  { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; font-family: var(--mono); }
.param-value { font-size: 16px; font-weight: 600; font-family: var(--mono); margin: 3px 0; }
.param-unit  { font-size: 10px; color: var(--text3); }
.param-ok    .param-value { color: var(--ok); }
.param-warn  .param-value { color: var(--warn); }
.param-danger .param-value { color: var(--danger); }
.param-neutral .param-value { color: var(--text); }

/* ── EMPTY STATE ─────────────────────────────────── */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
}
.empty .icon { font-size: 48px; margin-bottom: 12px; }
.empty p { font-size: 14px; }

/* ── TABS ─────────────────────────────────────────── */
.tabs { display: flex; gap: 2px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
.tab {
  padding: 9px 18px;
  font-size: 13px; cursor: pointer;
  color: var(--text2);
  border-bottom: 2px solid transparent;
  transition: all .15s;
}
.tab:hover  { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── SCROLLBAR ────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── TOAST ────────────────────────────────────────── */
#toast-container {
  position: fixed; bottom: 24px; right: 24px;
  z-index: 9999;
  display: flex; flex-direction: column; gap: 8px;
}
.toast {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 13px;
  min-width: 260px;
  animation: slideIn .2s ease;
  display: flex; align-items: center; gap: 10px;
}
.toast.ok     { border-left: 3px solid var(--ok); }
.toast.error  { border-left: 3px solid var(--danger); }
.toast.info   { border-left: 3px solid var(--accent); }

@keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ── SEARCH ──────────────────────────────────────── */
.search-bar {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 7px 12px;
}
.search-bar input {
  background: none; border: none;
  padding: 0; font-size: 13px; color: var(--text);
  flex: 1;
}
.search-bar input:focus { outline: none; box-shadow: none; }

/* ── SECTION HEADER ─────────────────────────────── */
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
.section-header h3 { font-size: 15px; font-weight: 600; }

/* ── SEPARATOR ──────────────────────────────────── */
.sep { height: 1px; background: var(--border); margin: 20px 0; }

/* ── CHART PLACEHOLDER ───────────────────────────── */
.mini-chart { height: 60px; display: flex; align-items: flex-end; gap: 3px; }
.bar { flex: 1; background: var(--accent); border-radius: 2px 2px 0 0; opacity: 0.6; min-height: 4px; transition: opacity .2s; }
.bar:hover { opacity: 1; }
</style>
</head>
<body>

<!-- ═══ SIDEBAR ═════════════════════════════════════════════════ -->
<aside class="sidebar">
  <div class="logo">
    <div class="logo-icon">💧</div>
    <h1>AquaLab</h1>
    <p>Traitement des eaux</p>
  </div>

  <nav id="nav">
    <div class="nav-item active" data-page="dashboard">
      <span class="icon">📊</span> Tableau de bord
    </div>
    <div class="nav-item" data-page="prelevements">
      <span class="icon">🧪</span> Prélèvements
    </div>
    <div class="nav-item" data-page="traitements">
      <span class="icon">⚗️</span> Traitements
    </div>
    <div class="nav-item" data-page="alertes">
      <span class="icon">🔔</span> Alertes
      <span class="nav-badge" id="badge-alertes">0</span>
    </div>
    <div class="nav-item" data-page="rapports">
      <span class="icon">📈</span> Rapports
    </div>
    <div class="nav-item" data-page="techniciens">
      <span class="icon">👤</span> Techniciens
    </div>
    <div class="nav-item" data-page="points">
      <span class="icon">📍</span> Sites
    </div>
  </nav>

  <div class="sidebar-footer">
    <div>AquaLab v1.0</div>
    <div style="color: var(--accent); font-size:10px; margin-top:2px;">● Système actif</div>
  </div>
</aside>

<!-- ═══ MAIN ════════════════════════════════════════════════════ -->
<div class="main">
  <div class="topbar">
    <h2 id="page-title">Tableau de bord</h2>
    <div class="topbar-right">
      <span id="topbar-date" style="font-size:12px; color:var(--text3); font-family:var(--mono);"></span>
    </div>
  </div>

  <div class="content" id="content">
    <div class="empty"><div class="icon">⏳</div><p>Chargement…</p></div>
  </div>
</div>

<!-- ═══ MODAL ═══════════════════════════════════════════════════ -->
<div class="modal-overlay" id="modal">
  <div class="modal" id="modal-body"></div>
</div>

<!-- TOAST -->
<div id="toast-container"></div>

<script>
// ══════════════════════════════════════════════════════════════
//  CONFIG & UTILS
// ══════════════════════════════════════════════════════════════
const API = '/api';

async function get(path)    { return (await fetch(API+path)).json(); }
async function post(path,d) { return (await fetch(API+path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)})).json(); }
async function put(path,d)  { return (await fetch(API+path,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)})).json(); }
async function del(path)    { return fetch(API+path,{method:'DELETE'}); }

function toast(msg, type='info') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  const icon = type==='ok'?'✅': type==='error'?'❌':'ℹ️';
  t.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(()=>t.remove(), 3500);
}

function fmt(v, d=1) { return v==null?'—': (+v).toFixed(d); }
function fmtDate(s)  { return s? new Date(s).toLocaleString('fr-CA',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}): '—'; }
function fmtDate2(s) { return s? new Date(s).toLocaleDateString('fr-CA',{day:'2-digit',month:'short',year:'numeric'}): '—'; }

function openModal(html) {
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', e => { if(e.target.id==='modal') closeModal(); });

// ── Page router ────────────────────────────────────────────────
const pages = {};
let currentPage = 'dashboard';

function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.page===page));
  const titles = {
    dashboard:'Tableau de bord', prelevements:'Prélèvements',
    traitements:'Traitements', alertes:'Alertes',
    rapports:'Rapports', techniciens:'Techniciens', points:'Sites de prélèvement'
  };
  document.getElementById('page-title').textContent = titles[page]||page;
  pages[page]?.();
}

document.getElementById('nav').addEventListener('click', e => {
  const item = e.target.closest('.nav-item');
  if (item?.dataset.page) navigate(item.dataset.page);
});

// Update date
function updateDate() {
  document.getElementById('topbar-date').textContent =
    new Date().toLocaleString('fr-CA',{weekday:'short',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
}
setInterval(updateDate, 30000);
updateDate();

// ══════════════════════════════════════════════════════════════
//  1. DASHBOARD
// ══════════════════════════════════════════════════════════════
pages.dashboard = async () => {
  const c = document.getElementById('content');
  c.innerHTML = `<div class="empty"><div class="icon">⏳</div><p>Chargement…</p></div>`;

  const [dash, alertes] = await Promise.all([
    get('/rapports/dashboard'),
    get('/alertes?nonAcquittees=true')
  ]);

  const critiques = alertes.filter(a=>a.niveau==='Critique').length;
  const avert = alertes.filter(a=>a.niveau==='Avertissement').length;

  c.innerHTML = `
  <div class="stats-grid">
    <div class="stat-card teal">
      <div class="stat-label">Prélèvements totaux</div>
      <div class="stat-value">${dash.total_prelevements}</div>
      <div class="stat-sub">${dash.prelevements_ce_mois} ce mois-ci</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-label">Traitements appliqués</div>
      <div class="stat-value">${dash.traitements_appliques}</div>
      <div class="stat-sub">Taux conformité : ${dash.taux_conformite}%</div>
    </div>
    <div class="stat-card warn">
      <div class="stat-label">En attente analyse</div>
      <div class="stat-value">${dash.en_attente}</div>
      <div class="stat-sub">${dash.prelevements_semaine} cette semaine</div>
    </div>
    <div class="stat-card ${critiques>0?'danger':'teal'}">
      <div class="stat-label">Alertes actives</div>
      <div class="stat-value">${alertes.length}</div>
      <div class="stat-sub">${critiques} critique(s), ${avert} avertissement(s)</div>
    </div>
  </div>

  <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
    <div class="card">
      <div class="card-title">Alertes récentes</div>
      ${alertes.length===0
        ? `<div style="color:var(--text3); font-size:13px; padding:12px 0">✅ Aucune alerte active</div>`
        : alertes.slice(0,5).map(a=>`

async function sauvegarderPrelevement() {
  const v = id => { const el=document.getElementById(id); return el?.value?+el.value:null; };
  const s = id => document.getElementById(id)?.value||null;

  const payload = {
    pointPrelevementId: +document.getElementById('f-point').value,
    technicienId:       +document.getElementById('f-tech').value,
    volumeTraiter:      v('f-vol'),
    observations:       s('f-obs'),
    pH: v('f-ph'), turbidite: v('f-turb'), temperature: v('f-temp'),
    conductivite: v('f-cond'), oxygeneDissous: v('f-o2'),
    dCO: v('f-dco'), dBO5: v('f-dbo'), mES: v('f-mes'),
    nitrates: v('f-no3'), nitrites: v('f-no2'), ammonium: v('f-nh4'),
    phosphore: v('f-phos'), coliformesFecaux: v('f-coli'), chloreTotalResiduel: v('f-cl')
  };

  try {
    const res = await post('/prelevements', payload);
    if (res.id) {
      closeModal();
      toast(`Prélèvement #${res.id} enregistré avec succès`, 'ok');
      pages.prelevements();
      refreshAlerteBadge();

      // Proposer immédiatement l'aide à la décision
      setTimeout(()=> {
        if(confirm(`Prélèvement #${res.id} enregistré.\n\nVoulez-vous générer la recommandation de traitement maintenant ?`))
          ouvrirDecision(res.id);
      }, 500);
    }
  } catch(e) { toast('Erreur lors de l\'enregistrement', 'error'); }
}

async function voirPrelevement(id) {
  const p = await get(`/prelevements/${id}`);

  function paramItem(nom, val, unit, min, max) {
    let cls = 'param-neutral';
    if(val!=null) {
      if((min!=null&&val<min)||(max!=null&&val>max)) cls = val<(min||0)*0.7||val>(max||99)*1.5?'param-danger':'param-warn';
      else cls = 'param-ok';
    }
    return `<div class="param-item ${cls}">
      <div class="param-name">${nom}</div>
      <div class="param-value">${fmt(val,2)}</div>
      <div class="param-unit">${unit}</div>
    </div>`;
  }

  openModal(`
    <div class="modal-header">
      <h3>🔍 Prélèvement #${p.id} — ${p.pointPrelevement?.nom||'?'}</h3>
      <button class="btn btn-sm btn-secondary btn-icon" onclick="closeModal()">✕</button>
    </div>
    <div style="display:flex; gap:16px; margin-bottom:16px; font-size:13px; color:var(--text2);">
      <span>📅 ${fmtDate(p.dateHeure)}</span>
      <span>👤 ${p.technicien?.prenom||''} ${p.technicien?.nom||''}</span>
      <span>📦 ${fmt(p.volumeTraiter,0)} m³</span>
    </div>
    <div class="card-title">Paramètres mesurés</div>
    <div class="param-grid" style="margin: 12px 0 20px;">
      ${paramItem('pH', p.pH, '', 6.5, 8.5)}
      ${paramItem('Turbidité', p.turbidite, 'NTU', null, 5)}
      ${paramItem('Température', p.temperature, '°C', null, null)}
      ${paramItem('O₂ Dissous', p.oxygeneDissous, 'mg/L', 2, null)}
      ${paramItem('DCO', p.dCO, 'mg/L', null, 125)}
      ${paramItem('DBO5', p.dBO5, 'mg/L', null, 25)}
      ${paramItem('MES', p.mES, 'mg/L', null, 35)}
      ${paramItem('Nitrates', p.nitrates, 'mg/L', null, 50)}
      ${paramItem('Ammonium', p.ammonium, 'mg/L', null, 10)}
      ${paramItem('Phosphore', p.phosphore, 'mg/L', null, 2)}
      ${paramItem('Coliformes', p.coliformesFecaux, 'UFC/100mL', null, 1000)}
      ${paramItem('Chlore', p.chloreTotalResiduel, 'mg/L', 0.2, 0.5)}
    </div>
    ${p.observations?`<div style="font-size:13px; color:var(--text2); margin-bottom:16px;">📝 ${p.observations}</div>`:''}
    ${p.traitement?`
      <div class="sep"></div>
      <div class="card-title">Traitement appliqué</div>
      <div class="doses-grid">
        ${p.traitement.doseChloreMgL?`<div class="dose-item"><div class="dose-produit">Chlore</div><div class="dose-valeur">${fmt(p.traitement.doseChloreMgL,2)}</div><div class="dose-unit">mg/L → ${fmt(p.traitement.doseChloreTotaleKg,3)} kg</div></div>`:''}
        ${p.traitement.doseCoagulantMgL?`<div class="dose-item"><div class="dose-produit">Coagulant</div><div class="dose-valeur">${fmt(p.traitement.doseCoagulantMgL,1)}</div><div class="dose-unit">mg/L → ${fmt(p.traitement.doseCoagulantTotaleKg,2)} kg</div></div>`:''}
        ${p.traitement.doseFloquantMgL?`<div class="dose-item"><div class="dose-produit">Floquant</div><div class="dose-valeur">${fmt(p.traitement.doseFloquantMgL,2)}</div><div class="dose-unit">mg/L → ${fmt(p.traitement.doseFloquantTotaleKg,3)} kg</div></div>`:''}
      </div>` : ''}
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Fermer</button>
      ${['Analyse','EnAttente'].includes(p.statut)?`<button class="btn btn-primary" onclick="closeModal(); ouvrirDecision(${p.id})">⚗️ Aide à la décision</button>`:''}

async function ouvrirDecision(prelevementId) {
  openModal(`<div style="text-align:center; padding:40px; color:var(--text2);">⏳ Calcul de la recommandation…</div>`);

  const [p, reco, techs] = await Promise.all([
    get(`/prelevements/${prelevementId}`),
    get(`/traitements/recommandation/${prelevementId}`),
    get('/techniciens')
  ]);

  const scoreColor = reco.scoreQualite>=80?'score-ok':reco.scoreQualite>=50?'score-warn':'score-danger';
  const decisionLabel = {
    TraitementStandard:'Traitement standard',
    TraitementRenforce:'Traitement renforcé',
    TraitementUrgence:'🚨 TRAITEMENT URGENT',
    RejetRejection:'⛔ Rejet/Retraitement',
    NouveauPrelevement:'Nouveau prélèvement requis'
  };

  openModal(`
    <div class="modal-header">
      <h3>⚗️ Aide à la décision — Prélèvement #${prelevementId}</h3>
      <button class="btn btn-sm btn-secondary btn-icon" onclick="closeModal()">✕</button>
    </div>

    <div class="reco-box">
      <div class="reco-header">
        <div>
          <div style="font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:1px; font-family:var(--mono); margin-bottom:6px;">Score qualité de l'eau</div>
          <div class="reco-score ${scoreColor}">${reco.scoreQualite}<span style="font-size:16px; opacity:.5;">/100</span></div>
          <div style="font-size:12px; color:var(--text2); margin-top:4px;">Risque : <strong style="color:${reco.niveauRisque==='Faible'?'var(--ok)':reco.niveauRisque==='Critique'?'var(--danger)':'var(--warn)'}">${reco.niveauRisque}</strong></div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:11px; color:var(--text3); margin-bottom:4px;">DÉCISION SUGGÉRÉE</div>
          <div style="font-size:14px; font-weight:700; color:${reco.decisionSuggere==='TraitementUrgence'?'var(--danger)':reco.decisionSuggere==='RejetRejection'?'var(--danger)':'var(--accent)'}">
            ${decisionLabel[reco.decisionSuggere]||reco.decisionSuggere}
          </div>
          <div style="font-size:11px; color:var(--text3); margin-top:4px;">Volume : ${fmt(p.volumeTraiter,0)||'N/A'} m³</div>
        </div>
      </div>

      ${(reco.doseChloreMgL||reco.doseCoagulantMgL||reco.doseFloquantMgL||reco.doseChaux||reco.doseAcide)?`
      <div class="card-title" style="margin:12px 0 8px;">Doses recommandées</div>
      <div class="doses-grid">
        ${reco.doseChloreMgL?`<div class="dose-item">
          <div class="dose-produit">Chlore (Cl₂ / eau de javel)</div>
          <div class="dose-valeur">${fmt(reco.doseChloreMgL,2)}</div>
          <div class="dose-unit">mg/L → <strong>${fmt(reco.doseChloreTotaleKg,3)} kg</strong> total</div>
        </div>`:''}
        ${reco.doseCoagulantMgL?`<div class="dose-item">
          <div class="dose-produit">Coagulant (Al₂(SO₄)₃ / FeCl₃)</div>
          <div class="dose-valeur">${fmt(reco.doseCoagulantMgL,1)}</div>
          <div class="dose-unit">mg/L → <strong>${fmt(reco.doseCoagulantTotaleKg,2)} kg</strong> total</div>
        </div>`:''}
        ${reco.doseFloquantMgL?`<div class="dose-item">
          <div class="dose-produit">Floquant (polymère)</div>
          <div class="dose-valeur">${fmt(reco.doseFloquantMgL,2)}</div>
          <div class="dose-unit">mg/L → <strong>${fmt(reco.doseFloquantTotaleKg,3)} kg</strong> total</div>
        </div>`:''}
        ${reco.doseChaux?`<div class="dose-item">
          <div class="dose-produit">Chaux vive Ca(OH)₂</div>
          <div class="dose-valeur">${fmt(reco.doseChaux,2)}</div>
          <div class="dose-unit">kg total (correction pH)</div>
        </div>`:''}
        ${reco.doseAcide?`<div class="dose-item">
          <div class="dose-produit">Acide HCl 33%</div>
          <div class="dose-valeur">${fmt(reco.doseAcide,2)}</div>
          <div class="dose-unit">L total (correction pH)</div>
        </div>`:''}
      </div>`:''}

      <div class="card-title" style="margin:12px 0 8px;">Actions recommandées</div>
      <ul class="reco-actions">
        ${reco.actionsRecommandees.map(a=>`<li><span>→</span><span>${a}</span></li>`).join('')}
      </ul>
    </div>

    <div class="sep"></div>
    <div class="card-title" style="margin-bottom:12px;">Valider & enregistrer le traitement</div>
    <div class="form-grid cols-2">
      <div class="form-group">
        <label>Technicien responsable</label>
        <select id="d-tech">
          ${techs.filter(t=>t.actif).map(t=>`<option value="${t.id}">${t.prenom} ${t.nom}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label>Décision finale</label>
        <select id="d-decision">
          ${Object.entries(decisionLabel).map(([k,v])=>`<option value="${k}" ${k===reco.decisionSuggere?'selected':''}>${v}</option>`).join('')}
        </select>
      </div>
      <div class="form-group full">
        <label>Notes opérateur</label>
        <textarea id="d-notes" rows="2" placeholder="Observations, ajustements…">${reco.justification}</textarea>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="enregistrerTraitement(${prelevementId}, ${JSON.stringify(reco).replace(/"/g,'&quot;')})">
        ✅ Enregistrer le traitement
      </button>
    </div>
  `);
}

async function enregistrerTraitement(prelevementId, reco) {
  const payload = {
    prelevementId,
    technicienId: +document.getElementById('d-tech').value,
    decision: document.getElementById('d-decision').value,
    notesOperateur: document.getElementById('d-notes').value,
    doseChloreMgL:         reco.doseChloreMgL,
    doseChloreTotaleKg:    reco.doseChloreTotaleKg,
    doseCoagulantMgL:      reco.doseCoagulantMgL,
    doseCoagulantTotaleKg: reco.doseCoagulantTotaleKg,
    doseFloquantMgL:       reco.doseFloquantMgL,
    doseFloquantTotaleKg:  reco.doseFloquantTotaleKg,
    doseChaux:             reco.doseChaux,
    doseAcide:             reco.doseAcide,
    justification:         reco.justification
  };
  try {
    await post('/traitements', payload);
    closeModal();
    toast('Traitement enregistré avec succès', 'ok');
    pages.prelevements();
  } catch(e) { toast('Erreur lors de l\'enregistrement', 'error'); }
}

              <td class="mono">#${t.id}</td>
              <td class="mono">${fmtDate2(t.dateTraitement)}</td>
              <td class="mono">#${t.prelevementId} — ${t.prelevement?.pointPrelevement?.nom||'?'}</td>
              <td><span class="badge ${decBadge[t.decision]||'badge-neutral'}">${decLabel[t.decision]||t.decision}</span></td>
              <td class="mono">${fmt(t.doseChloreMgL,2)}</td>
              <td class="mono">${fmt(t.doseCoagulantMgL,1)}</td>
              <td>${t.technicien?.prenom||''} ${t.technicien?.nom||''}</td>
              <td>${t.applique?'<span class="badge badge-ok">✓ Oui</span>':'<span class="badge badge-neutral">Non</span>'}</td>
              <td>${t.conformeNormes===true?'<span class="badge badge-ok">✓</span>':t.conformeNormes===false?'<span class="badge badge-danger">✗</span>':'<span class="badge badge-neutral">—</span>'}</td>
              <td>${!t.applique?`<button class="btn btn-sm btn-primary" onclick="ouvrirApplication(${t.id})">Appliquer</button>`:'<button class="btn btn-sm btn-secondary" onclick="voirResultat(${t.id})">Résultat</button>'}</td>
            </tr>`).join('')}
      </tbody>
    </table>
    </div>
  </div>`;
};

async function ouvrirApplication(traitementId) {
  openModal(`
    <div class="modal-header">
      <h3>✅ Confirmer l'application du traitement #${traitementId}</h3>
      <button class="btn btn-sm btn-secondary btn-icon" onclick="closeModal()">✕</button>
    </div>
    <div class="card-title" style="margin-bottom:12px;">Mesures post-traitement</div>
    <div class="form-grid">
      <div class="form-group">
        <label>pH final mesuré</label>
        <input type="number" id="r-ph" step="0.1" min="0" max="14" placeholder="7.0"/>
      </div>
      <div class="form-group">
        <label>Turbidité finale (NTU)</label>
        <input type="number" id="r-turb" step="0.1" placeholder="NTU"/>
      </div>
      <div class="form-group">
        <label>Chlore résiduel final (mg/L)</label>
        <input type="number" id="r-cl" step="0.01" placeholder="mg/L"/>
      </div>
      <div class="form-group">
        <label>Eau conforme aux normes ?</label>
        <select id="r-conf">
          <option value="">— Sélectionner</option>
          <option value="true">✅ Oui — conforme</option>
          <option value="false">❌ Non — non conforme</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Notes opérateur</label>
        <textarea id="r-notes" rows="2" placeholder="Observations post-traitement…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="confirmerApplication(${traitementId})">✅ Confirmer l'application</button>
    </div>
  `);
}

async function confirmerApplication(id) {
  const payload = {
    pHFinal:       document.getElementById('r-ph').value?+document.getElementById('r-ph').value:null,
    turbiditeFinal:document.getElementById('r-turb').value?+document.getElementById('r-turb').value:null,
    chloreFinal:   document.getElementById('r-cl').value?+document.getElementById('r-cl').value:null,
    conformeNormes:document.getElementById('r-conf').value===''?null:document.getElementById('r-conf').value==='true',
    notes:         document.getElementById('r-notes').value||null
  };
  await put(`/traitements/${id}/appliquer`, payload);
  closeModal();
  toast('Application confirmée', 'ok');
  pages.traitements();
}

// ══════════════════════════════════════════════════════════════
//  5. ALERTES
// ══════════════════════════════════════════════════════════════
pages.alertes = async () => {
  const c = document.getElementById('content');
  c.innerHTML = `<div class="empty"><div class="icon">⏳</div></div>`;
  const alertes = await get('/alertes');

  const actives  = alertes.filter(a=>!a.acquittee);
  const passees  = alertes.filter(a=>a.acquittee);

  c.innerHTML = `
  <div class="tabs">
    <div class="tab active" id="tab-act" onclick="switchTab('act')">Actives (${actives.length})</div>
    <div class="tab" id="tab-pass" onclick="switchTab('pass')">Acquittées (${passees.length})</div>
  </div>
  <div id="alertes-act">
    ${actives.length===0
      ? `<div class="empty"><div class="icon">✅</div><p>Aucune alerte active — tout est normal</p></div>`
      : actives.map(a=>renderAlerte(a, true)).join('')}
  </div>
  <div id="alertes-pass" style="display:none;">
    ${passees.map(a=>renderAlerte(a, false)).join('')}
  </div>`;
};

function renderAlerte(a, showAcquitter) {
  return `
  <div class="alerte-item ${a.niveau}" id="alerte-${a.id}">
    <div style="flex:1;">
      <div style="display:flex; align-items:center; gap:8px; margin-bottom:4px;">
        <span class="badge ${a.niveau==='Critique'?'badge-danger':a.niveau==='Avertissement'?'badge-warn':'badge-info'}">${a.niveau}</span>
        <span class="alerte-titre">${a.titre}</span>
      </div>
      <div class="alerte-msg">${a.message||''}</div>
      <div class="alerte-meta">
        Prélèvement #${a.prelevementId||'?'} · ${fmtDate(a.dateCreation)}
        ${a.valeurMesuree!=null?` · Valeur : <strong>${fmt(a.valeurMesuree,2)}</strong>`:'' }
        ${a.seuilMaximum!=null?` · Max : ${a.seuilMaximum}`:''}
        ${a.seuilMinimum!=null?` · Min : ${a.seuilMinimum}`:''}
      </div>
    </div>
    ${showAcquitter?`<button class="btn btn-sm btn-secondary" onclick="acquitterAlerte(${a.id})">Acquitter</button>`:''}
  </div>`;
}

function switchTab(t) {
  document.getElementById('tab-act').classList.toggle('active', t==='act');
  document.getElementById('tab-pass').classList.toggle('active', t==='pass');
  document.getElementById('alertes-act').style.display = t==='act'?'':'none';
  document.getElementById('alertes-pass').style.display = t==='pass'?'':'none';
}

async function acquitterAlerte(id) {
  await put(`/alertes/${id}/acquitter`, {});
  toast('Alerte acquittée', 'ok');
  pages.alertes();
  refreshAlerteBadge();
}

async function refreshAlerteBadge() {
  const alertes = await get('/alertes?nonAcquittees=true');
  const badge = document.getElementById('badge-alertes');
  const n = alertes.filter(a=>a.niveau==='Critique').length;
  badge.textContent = alertes.length;
  badge.classList.toggle('show', alertes.length > 0);
}

// ══════════════════════════════════════════════════════════════
//  6. RAPPORTS
// ══════════════════════════════════════════════════════════════
pages.rapports = async () => {
  const c = document.getElementById('content');
  c.innerHTML = `<div class="empty"><div class="icon">⏳</div></div>`;

  const [dash, evol] = await Promise.all([
    get('/rapports/dashboard'),
    get('/rapports/evolution?jours=30')
  ]);

  // Build mini charts
  function miniChart(data, key, color) {
    if(!data.length) return '<div class="mini-chart"><div style="color:var(--text3);font-size:11px;">Pas de données</div></div>';
    const vals = data.map(d=>d[key]).filter(v=>v!=null);
    if(!vals.length) return '<div class="mini-chart"></div>';
    const max = Math.max(...vals);
    return `<div class="mini-chart">${data.map(d=>`
      <div class="bar" style="height:${d[key]?Math.max(4,(d[key]/max)*100):4}%; background:${color};" title="${d.date}: ${fmt(d[key],1)}"></div>
    `).join('')}</div>`;
  }

  c.innerHTML = `
  <div class="stats-grid" style="grid-template-columns: repeat(3, 1fr);">
    <div class="stat-card teal">
      <div class="stat-label">Ce mois</div>
      <div class="stat-value">${dash.prelevements_ce_mois}</div>
      <div class="stat-sub">prélèvements</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-label">Taux conformité</div>
      <div class="stat-value">${dash.taux_conformite}%</div>
      <div class="stat-sub">${dash.traitements_appliques} traitements</div>
    </div>
    <div class="stat-card ${dash.alertes_actives>0?'danger':'teal'}">
      <div class="stat-label">Alertes actives</div>
      <div class="stat-value">${dash.alertes_actives}</div>
      <div class="stat-sub">à traiter</div>
    </div>
  </div>

  <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
    <div class="card">
      <div class="card-title">Évolution pH (30 jours)</div>
      ${miniChart(evol, 'pH', 'var(--accent)')}
      <div style="font-size:11px; color:var(--text3); margin-top:6px; font-family:var(--mono);">Norme : 6.5 – 8.5</div>
    </div>
    <div class="card">
      <div class="card-title">Évolution Turbidité (30 jours)</div>
      ${miniChart(evol, 'turbidite', 'var(--accent2)')}
      <div style="font-size:11px; color:var(--text3); margin-top:6px; font-family:var(--mono);">Norme : ≤ 5 NTU</div>
    </div>
    <div class="card">
      <div class="card-title">Évolution DCO (30 jours)</div>
      ${miniChart(evol, 'DCO', 'var(--warn)')}
      <div style="font-size:11px; color:var(--text3); margin-top:6px; font-family:var(--mono);">Norme : ≤ 125 mg/L</div>
    </div>
    <div class="card">
      <div class="card-title">Évolution Coliformes (30 jours)</div>
      ${miniChart(evol, 'coliformes', 'var(--danger)')}
      <div style="font-size:11px; color:var(--text3); margin-top:6px; font-family:var(--mono);">Norme : ≤ 1000 UFC/100mL</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Tableau récapitulatif — Données brutes</div>
    <div class="table-wrap">
    <table>
      <thead><tr>
        <th>Date</th><th>pH</th><th>Turbidité</th><th>DCO</th><th>DBO5</th><th>Coliformes</th>
      </tr></thead>
      <tbody>
        ${evol.length===0
          ? `<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--text3)">Aucune donnée sur 30 jours</td></tr>`
          : evol.map(d=>`<tr>
              <td class="mono">${d.date}</td>
              <td class="mono" style="color:${d.pH?(d.pH<6.5||d.pH>8.5?'var(--warn)':'var(--ok)'):'var(--text3)'}">${fmt(d.pH,1)}</td>
              <td class="mono" style="color:${d.turbidite?(d.turbidite>5?'var(--warn)':'var(--ok)'):'var(--text3)'}">${fmt(d.turbidite,1)}</td>
              <td class="mono" style="color:${d.DCO?(d.DCO>125?'var(--warn)':'var(--ok)'):'var(--text3)'}">${fmt(d.DCO,0)}</td>
              <td class="mono" style="color:${d.DBO5?(d.DBO5>25?'var(--warn)':'var(--ok)'):'var(--text3)'}">${fmt(d.DBO5,0)}</td>
              <td class="mono" style="color:${d.coliformes?(d.coliformes>1000?'var(--warn)':'var(--ok)'):'var(--text3)'}">${fmt(d.coliformes,0)}</td>
            </tr>`).join('')}
      </tbody>
    </table>
    </div>
  </div>`;
};

function openNewTechnicien() {
  openModal(`
    <div class="modal-header">
      <h3>👤 Nouveau technicien</h3>
      <button class="btn btn-sm btn-secondary btn-icon" onclick="closeModal()">✕</button>
    </div>
    <div class="form-grid">
      <div class="form-group"><label>Nom *</label><input id="t-nom" type="text"/></div>
      <div class="form-group"><label>Prénom *</label><input id="t-prenom" type="text"/></div>
      <div class="form-group"><label>Email</label><input id="t-email" type="email"/></div>
      <div class="form-group"><label>Téléphone</label><input id="t-tel" type="tel"/></div>
      <div class="form-group">
        <label>Rôle</label>
        <select id="t-role">
          <option>Technicien</option>
          <option>Chef de Labo</option>
          <option>Admin</option>
        </select>
      </div>

      <button class="btn btn-primary" onclick="saveTechnicien()">💾 Enregistrer</button>
    </div>
  `);
}

async function saveTechnicien() {
  const payload = {
    nom: document.getElementById('t-nom').value,
    prenom: document.getElementById('t-prenom').value,
    email: document.getElementById('t-email').value||null,
    telephone: document.getElementById('t-tel').value||null,
    role: document.getElementById('t-role').value,
    actif: true
  };
  if(!payload.nom || !payload.prenom) { toast('Nom et prénom requis', 'error'); return; }
  await post('/techniciens', payload);
  closeModal();
  toast('Technicien ajouté', 'ok');
  pages.techniciens();
}
